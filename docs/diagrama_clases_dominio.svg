<svg viewBox="0 0 1400 850" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">
  <title>Diagrama de clases del dominio del Truque</title>
  <desc>Diagrama UML mostrando las clases Partida, Juego, Ronda, Equipo, Jugador, Mano, Baraja, Carta, Numero y Palo, y sus relaciones.</desc>

  <style>
    .box { fill: #f5f5f5; stroke: #999; stroke-width: 1.5; }
    .title { font-weight: bold; fill: #1a1a1a; text-anchor: middle; }
    .attr { fill: #444; }
    .sep { stroke: #999; stroke-width: 1; }
    .rel { stroke: #999; stroke-width: 1.5; fill: none; }
    .mult { fill: #555; font-size: 11px; }
    .label { fill: #555; font-size: 11px; font-style: italic; }
  </style>

  <!-- ===================== RELATIONSHIPS (drawn first, behind boxes) ===================== -->

  <!-- Partida -> Baraja (composition 1-1) -->
  <line class="rel" x1="710" y1="140" x2="170" y2="200"/>
  <polygon points="180,210 195,205 188,220" fill="#555"/>
  <text class="mult" x="715" y="155">1</text>
  <text class="mult" x="195" y="195">1</text>

  <!-- Partida -> Juego (composition 1-0..1) -->
  <line class="rel" x1="710" y1="140" x2="710" y2="200"/>
  <polygon points="700,210 720,210 710,195" fill="#555"/>
  <text class="mult" x="715" y="155">1</text>
  <text class="mult" x="715" y="195">0..1</text>

  <!-- Partida -> Equipo (composition 1-2) -->
  <line class="rel" x1="710" y1="140" x2="1230" y2="200"/>
  <polygon points="1228,213 1240,205 1232,220" fill="#555"/>
  <text class="mult" x="715" y="155">1</text>
  <text class="mult" x="1190" y="195">2</text>

  <!-- Juego -> Ronda (composition 1-0..1) -->
  <line class="rel" x1="710" y1="292" x2="710" y2="380"/>
  <polygon points="700,390 720,390 710,375" fill="#555"/>
  <text class="mult" x="715" y="305">1</text>
  <text class="mult" x="715" y="375">0..1</text>

  <!-- Equipo -> Jugador (composition 1-*) -->
  <line class="rel" x1="1220" y1="292" x2="1220" y2="380"/>
  <polygon points="1210,390 1230,390 1220,375" fill="#555"/>
  <text class="mult" x="1225" y="305">1</text>
  <text class="mult" x="1225" y="375">*</text>

  <!-- Jugador -> Mano (composition 1-1) -->
  <line class="rel" x1="1220" y1="512" x2="1220" y2="560"/>
  <polygon points="1210,570 1230,570 1220,555" fill="#555"/>
  <text class="mult" x="1225" y="525">1</text>
  <text class="mult" x="1225" y="555">1</text>

  <!-- Baraja -> Carta (aggregation 1-*) -->
  <line class="rel" x1="170" y1="270" x2="370" y2="560"/>
  <polygon points="375,575 360,565 372,553" fill="none" stroke="#555" stroke-width="1.5"/>
  <text class="mult" x="180" y="285">1</text>
  <text class="mult" x="345" y="555">40</text>

  <!-- Mano -> Carta (aggregation 1-0..3) -->
  <line class="rel" x1="1100" y1="616" x2="500" y2="608"/>
  <polygon points="500,598 500,618 515,608" fill="none" stroke="#555" stroke-width="1.5"/>
  <text class="mult" x="1060" y="630">1</text>
  <text class="mult" x="510" y="630">0..3</text>

  <!-- Ronda -> Jugador "mano" (association 1-0..1) -->
  <line class="rel" x1="820" y1="430" x2="1100" y2="440"/>
  <text class="label" x="870" y="425">mano</text>
  <text class="mult" x="825" y="445">1</text>
  <text class="mult" x="1075" y="445">0..1</text>

  <!-- Ronda -> Carta "guía" (association 1-0..1) -->
  <line class="rel" x1="650" y1="492" x2="450" y2="560"/>
  <text class="label" x="500" y="525">guía</text>
  <text class="mult" x="655" y="510">1</text>
  <text class="mult" x="455" y="555">0..1</text>

  <!-- Carta -> Numero (1-1) -->
  <line class="rel" x1="360" y1="652" x2="240" y2="720"/>
  <text class="mult" x="365" y="670">1</text>
  <text class="mult" x="240" y="715">1</text>

  <!-- Carta -> Palo (1-1) -->
  <line class="rel" x1="440" y1="652" x2="490" y2="720"/>
  <text class="mult" x="445" y="670">1</text>
  <text class="mult" x="495" y="715">1</text>

  <!-- ===================== CLASS BOXES ===================== -->

  <!-- Partida -->
  <g>
    <rect class="box" x="580" y="20" width="260" height="120"/>
    <text class="title" x="710" y="38">Partida</text>
    <line class="sep" x1="580" y1="46" x2="840" y2="46"/>
    <text class="attr" x="592" y="64">baraja: Baraja</text>
    <text class="attr" x="592" y="82">equipos: list[Equipo]</text>
    <text class="attr" x="592" y="100">juego: Juego | None</text>
    <text class="attr" x="592" y="118">puntuacion: list[int]</text>
  </g>

  <!-- Baraja -->
  <g>
    <rect class="box" x="40" y="200" width="200" height="70"/>
    <text class="title" x="140" y="218">Baraja</text>
    <line class="sep" x1="40" y1="226" x2="240" y2="226"/>
    <text class="attr" x="52" y="244">cartas: list[Carta]</text>
    <text class="attr" x="52" y="262">tamaño: int</text>
  </g>

  <!-- Juego -->
  <g>
    <rect class="box" x="600" y="200" width="220" height="92"/>
    <text class="title" x="710" y="218">Juego</text>
    <line class="sep" x1="600" y1="226" x2="820" y2="226"/>
    <text class="attr" x="612" y="244">ronda: Ronda | None</text>
    <text class="attr" x="612" y="262">puntuacion: list[int]</text>
    <text class="attr" x="612" y="280">la_falta(): int</text>
  </g>

  <!-- Equipo -->
  <g>
    <rect class="box" x="1110" y="200" width="220" height="92"/>
    <text class="title" x="1220" y="218">Equipo</text>
    <line class="sep" x1="1110" y1="226" x2="1330" y2="226"/>
    <text class="attr" x="1122" y="244">id: int</text>
    <text class="attr" x="1122" y="262">jugadores: list[Jugador]</text>
  </g>

  <!-- Ronda -->
  <g>
    <rect class="box" x="600" y="380" width="220" height="112"/>
    <text class="title" x="710" y="398">Ronda</text>
    <line class="sep" x1="600" y1="406" x2="820" y2="406"/>
    <text class="attr" x="612" y="424">estado: Any | None</text>
    <text class="attr" x="612" y="442">guia: Carta | None</text>
    <text class="attr" x="612" y="460">mano: Jugador | None</text>
    <text class="attr" x="612" y="478">poner_guia(carta)</text>
  </g>

  <!-- Jugador -->
  <g>
    <rect class="box" x="1100" y="380" width="240" height="132"/>
    <text class="title" x="1220" y="398">Jugador</text>
    <line class="sep" x1="1100" y1="406" x2="1340" y2="406"/>
    <text class="attr" x="1112" y="424">id: int</text>
    <text class="attr" x="1112" y="442">nombre: str</text>
    <text class="attr" x="1112" y="460">equipo: int | None</text>
    <text class="attr" x="1112" y="478">mano: Mano</text>
    <text class="attr" x="1112" y="496">echar_carta(idx)</text>
  </g>

  <!-- Carta -->
  <g>
    <rect class="box" x="300" y="560" width="200" height="92"/>
    <text class="title" x="400" y="578">Carta «frozen»</text>
    <line class="sep" x1="300" y1="586" x2="500" y2="586"/>
    <text class="attr" x="312" y="604">numero: Numero</text>
    <text class="attr" x="312" y="622">palo: Palo</text>
  </g>

  <!-- Mano -->
  <g>
    <rect class="box" x="1100" y="560" width="240" height="112"/>
    <text class="title" x="1220" y="578">Mano</text>
    <line class="sep" x1="1100" y1="586" x2="1340" y2="586"/>
    <text class="attr" x="1112" y="604">cartas: list[Carta]</text>
    <text class="attr" x="1112" y="622">estado_de_cartas: list[int]</text>
    <text class="attr" x="1112" y="640">max_cartas: int</text>
    <text class="attr" x="1112" y="658">echar_carta(idx)</text>
  </g>

  <!-- Numero -->
  <g>
    <rect class="box" x="120" y="720" width="180" height="70"/>
    <text class="title" x="210" y="738">Numero «enum»</text>
    <line class="sep" x1="120" y1="746" x2="300" y2="746"/>
    <text class="attr" x="132" y="764">AS, DOS ... REY</text>
  </g>

  <!-- Palo -->
  <g>
    <rect class="box" x="400" y="720" width="180" height="70"/>
    <text class="title" x="490" y="738">Palo «enum»</text>
    <line class="sep" x1="400" y1="746" x2="580" y2="746"/>
    <text class="attr" x="412" y="764">OROS, COPAS, ESPADAS, BASTOS</text>
  </g>

</svg>
